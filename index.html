<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RSVP Reader</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=Inter:wght@400;500;600&display=swap');

  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #1B140F;
    color: #EFE4D4;
    font-family: 'Inter', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .app {
    width: 100%;
    max-width: 420px;
    background: radial-gradient(ellipse 380px 320px at 50% 38%, #2E1A16 0%, #1B140F 70%);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 26px;
  }
  .label {
    font-size: 11px;
    letter-spacing: 3px;
    color: #A98A5E;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .glow {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    min-height: 100px;
    width: 100%;
  }
  .word {
    font-family: 'Source Serif 4', serif;
    font-size: 68px;
    font-weight: 600;
    display: flex;
    text-shadow: 0 0 34px rgba(224,58,58,0.28);
  }
  .left { text-align: right; white-space: pre; }
  .anchor { color: #E03A3A; white-space: pre; }
  .right { text-align: left; white-space: pre; }
  .readout {
    font-size: 12px;
    color: #8A7256;
    letter-spacing: 1px;
    margin-bottom: 20px;
  }
  .file-row {
    width: 100%;
    margin-bottom: 14px;
  }
  input[type=file] {
    color: #8A7256;
    font-size: 12px;
    width: 100%;
  }
  textarea {
    width: 100%;
    background: #241A14;
    border: 1px solid #4A3A28;
    color: #EFE4D4;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 18px;
    resize: vertical;
  }
  .controls { width: 100%; }
  .btnrow {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }
  button {
    flex: 1;
    background: transparent;
    border: 1px solid #4A3A28;
    color: #EFE4D4;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    padding: 13px 0;
    border-radius: 999px;
    cursor: pointer;
  }
  button.primary {
    background: #E03A3A;
    border-color: #E03A3A;
    color: #1B140F;
    font-weight: 600;
  }
  .slider-wrap { display: flex; flex-direction: column; gap: 10px; }
  .ticks {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: #6B5A44;
  }
  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 3px;
    border-radius: 2px;
    background: #3A2C1E;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #E0645C;
    box-shadow: 0 0 10px rgba(224,58,58,0.55);
  }
</style>
</head>
<body>

<div class="app">
  <div class="label">Reading Lamp</div>

  <div class="glow">
    <span class="left" id="left"></span><span class="anchor" id="anchor"></span><span class="right" id="right"></span>
  </div>

  <div class="readout" id="readout">Load a PDF or paste text below</div>

  <div class="file-row">
    <input type="file" id="pdfInput" accept="application/pdf">
  </div>
  <textarea id="textInput" placeholder="Or paste text here" rows="3"></textarea>

  <div class="controls">
    <div class="btnrow">
      <button class="primary" id="playBtn">Play</button>
      <button id="pauseBtn">Pause</button>
      <button id="resetBtn">Reset</button>
    </div>
    <div class="slider-wrap">
      <input type="range" id="speedSlider" min="200" max="450" step="50" value="200">
      <div class="ticks"><span>200</span><span>250</span><span>300</span><span>350</span><span>400</span><span>450</span></div>
    </div>
  </div>
</div>

<script src="pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = "pdf.worker.min.js";

let words = [];
let index = 0;
let timer = null;
let wpm = 200;

const leftEl = document.getElementById("left");
const anchorEl = document.getElementById("anchor");
const rightEl = document.getElementById("right");
const readoutEl = document.getElementById("readout");
const speedSlider = document.getElementById("speedSlider");

speedSlider.addEventListener("input", () => {
  wpm = parseInt(speedSlider.value);
  updateReadout();
  if (timer) { pause(); play(); }
});

document.getElementById("textInput").addEventListener("input", (e) => {
  words = e.target.value.split(/\s+/).filter(Boolean);
  index = 0;
  updateReadout();
});

document.getElementById("pdfInput").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  const buffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
  let fullText = "";
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    fullText += content.items.map(item => item.str).join(" ") + " ";
  }
  words = fullText.split(/\s+/).filter(Boolean);
  index = 0;
  updateReadout();
});

function getAnchorIndex(word) {
  const len = word.length;
  if (len <= 1) return 0;
  if (len <= 5) return 1;
  if (len <= 9) return 2;
  if (len <= 13) return 3;
  return 4;
}

function updateReadout() {
  if (words.length === 0) {
    readoutEl.textContent = "Load a PDF or paste text below";
  } else {
    readoutEl.textContent = `Word ${index} of ${words.length} · ${wpm} wpm`;
  }
}

function showNextWord() {
  if (index >= words.length) {
    pause();
    leftEl.textContent = "";
    anchorEl.textContent = "";
    rightEl.textContent = "";
    readoutEl.textContent = "Done";
    return;
  }
  const word = words[index];
  const anchorPos = getAnchorIndex(word);
  leftEl.textContent = word.slice(0, anchorPos);
  anchorEl.textContent = word.slice(anchorPos, anchorPos + 1);
  rightEl.textContent = word.slice(anchorPos + 1);
  index++;
  updateReadout();
}

function play() {
  if (words.length === 0) return;
  const interval = 60000 / wpm;
  timer = setInterval(showNextWord, interval);
}

function pause() {
  clearInterval(timer);
  timer = null;
}

document.getElementById("playBtn").addEventListener("click", play);
document.getElementById("pauseBtn").addEventListener("click", pause);
document.getElementById("resetBtn").addEventListener("click", () => {
  pause();
  index = 0;
  leftEl.textContent = "";
  anchorEl.textContent = "";
  rightEl.textContent = "";
  updateReadout();
});
</script>

</body>
</html>
